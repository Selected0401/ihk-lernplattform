# GitHub Pages deployment workflow for PrüfBlick
name: GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Verify PrüfBlick Release A contract
        run: python3 scripts/test-brand-release-a.py

      - name: Verify PWA installability
        run: python3 scripts/test-pwa-installability.py

      - name: Verify curated public artifact
        run: python3 scripts/test-public-release-artifact.py

      - name: Build curated public artifact
        run: python3 scripts/build-public-site.py --output dist-public
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4