<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Excel - IHK Lernplattform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        
        h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            min-height: 44px;
            line-height: 1.2;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .topic-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .topic-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        
        .topic-desc {
            color: #666;
            margin-bottom: 20px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            min-height: 44px;
            line-height: 1.2;
        }
        
        .start-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        
        /* Safari Fixes */
        .back-btn, .start-btn {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Zurück</a>
        
        <header>
            <h1>Microsoft Excel</h1>
            <p>Tabellenkalkulation für Büromanagement</p>
        </header>
        
        <main>
            <div class="topics-grid">
                <div class="topic-card">
                    <h2 class="topic-title">Formeln</h2>
                    <p class="topic-desc">Grundlegende Formeln, Funktionen, Berechnungen</p>
                    <button class="start-btn" onclick="startTopic('formeln')">Starten →</button>
                </div>
                
                <div class="topic-card">
                    <h2 class="topic-title">SVERWEIS</h2>
                    <p class="topic-desc">Nachschlagefunktionen, Verknüpfungen, Datenabgleich</p>
                    <button class="start-btn" onclick="startTopic('sverweis')">Starten →</button>
                </div>
                
                <div class="topic-card">
                    <h2 class="topic-title">Pivot-Tabellen</h2>
                    <p class="topic-desc">Datenanalyse, Auswertungen, Berichte</p>
                    <button class="start-btn" onclick="startTopic('pivot')">Starten →</button>
                </div>
                
                <div class="topic-card">
                    <h2 class="topic-title">Diagramme</h2>
                    <p class="topic-desc">Visualisierungen, Chart-Typen, Gestaltung</p>
                    <button class="start-btn" onclick="startTopic('diagramme')">Starten →</button>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        function startTopic(topic) {
            console.log('Topic starten:', topic);
            alert('Thema "' + topic + '" wird vorbereitet...');
            // Hier kommt die Lernlogik hin
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Excel Modul geladen');
        });
    </script>
</body>
</html>
